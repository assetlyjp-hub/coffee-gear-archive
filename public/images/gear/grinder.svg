<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- グラインダーのシルエット -->
  <rect width="400" height="300" fill="#1C1714"/>
  <!-- 円筒形ボディ -->
  <rect x="165" y="60" width="70" height="200" rx="6" fill="none" stroke="#C8956C" stroke-width="2" opacity="0.6"/>
  <!-- ハンドル -->
  <line x1="200" y1="60" x2="200" y2="40" stroke="#C8956C" stroke-width="2" opacity="0.6"/>
  <line x1="200" y1="40" x2="260" y2="40" stroke="#C8956C" stroke-width="2" opacity="0.6"/>
  <circle cx="260" cy="40" r="6" fill="none" stroke="#C8956C" stroke-width="2" opacity="0.6"/>
  <!-- 調整ダイヤル -->
  <circle cx="200" cy="130" r="15" fill="none" stroke="#C8956C" stroke-width="1" opacity="0.3"/>
  <!-- 粉受け部分 -->
  <line x1="165" y1="200" x2="235" y2="200" stroke="#C8956C" stroke-width="1" opacity="0.4"/>
  <!-- ラベル -->
  <text x="200" y="290" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#666">Grinder</text>
</svg>
